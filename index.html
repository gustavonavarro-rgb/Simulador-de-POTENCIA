<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Explorador de Potencias</title>

<link rel="stylesheet" href="estilos.css">

</head>

<body>

<div class="contenedor">

<h1>EXPLORADOR DE POTENCIAS</h1>

<p class="descripcion">

La potenciación es una operación de multiplicación de un mismo número llamado BASE, tantas veces como indica el un número superior y pequeño llamado EXPONENTE.

</p>

<hr>

<div class="panel">

<h2>BASE</h2>

<div id="baseActual" class="valor valorBase">2</div>

<div id="botonesBase" class="botonera"></div>

</div>

<hr>

<div class="panel">

<h2>EXPONENTE</h2>

<div id="exponenteActual" class="valor valorExponente">2</div>

<div id="botonesExponente" class="botonera"></div>

</div>

<hr>

<div class="panel">

<h2>POTENCIA</h2>

<div id="potencia" class="resultadoGrande"></div>

<div id="lecturaPotencia" class="lecturaPotencia"></div>

</div>

<div class="panel">

<h2>DESARROLLO</h2>

<div id="desarrollo" class="resultado"></div>

</div>

<div class="panel">

<h2>RESULTADO</h2>

<div id="resultado" class="resultado"></div>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
